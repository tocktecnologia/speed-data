name: Deploy Flutter Web to FTP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: deploy-web-ftp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Validate FTP secrets
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ] || \
             [ -z "${{ secrets.FTP_USERNAME }}" ] || \
             [ -z "${{ secrets.FTP_PASSWORD }}" ] || \
             [ -z "${{ secrets.FTP_SERVER_DIR }}" ]; then
            echo "Missing FTP secrets. Configure FTP_SERVER, FTP_USERNAME, FTP_PASSWORD and FTP_SERVER_DIR."
            exit 1
          fi

      - name: Enable Flutter web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Build web app
        run: flutter build web --release

      - name: Deploy to FTP server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: build/web/
          protocol: ${{ vars.FTP_PROTOCOL || 'ftp' }}
          port: ${{ vars.FTP_PORT || 21 }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
